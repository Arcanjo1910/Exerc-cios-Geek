<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 8</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 30px;
    }

    .card {
      max-width: 1000px;
      margin: auto;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
    }

    .personagem {
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
    }

    .personagem img {
      width: 100%;
      height: 140px;
      border-radius: 8px;
    }

    #detalhes {
      margin-top: 20px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Galeria de Personagens</h1>

    <div class="galeria">
      <div class="personagem" onclick="mostrarDetalhes('Batman', 'DC', 'Herói de Gotham')">
        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 220'><rect width='220' height='220' rx='18' fill='%23111827'/><path d='M55 60 L80 30 L95 60 L125 60 L140 30 L165 60 L165 150 Q110 200 55 150Z' fill='%230f172a'/><ellipse cx='110' cy='130' rx='50' ry='18' fill='%23facc15'/><path d='M85 130 L98 120 L104 127 L116 127 L122 120 L135 130 L120 130 L112 136 L108 136 L100 130Z' fill='%23111827'/><rect x='72' y='76' width='76' height='22' rx='8' fill='%23334155'/></svg>" alt="Batman">
        <p>Batman</p>
      </div>

      <div class="personagem" onclick="mostrarDetalhes('Homem de Ferro', 'Marvel', 'Herói com armadura tecnológica')">
        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 220'><rect width='220' height='220' rx='18' fill='%237f1d1d'/><path d='M70 55 L150 55 L165 85 L152 158 L68 158 L55 85Z' fill='%23dc2626'/><path d='M82 70 L138 70 L146 92 L138 146 L82 146 L74 92Z' fill='%23f59e0b'/><rect x='90' y='100' width='40' height='18' rx='6' fill='%23ffffff'/><rect x='85' y='85' width='18' height='10' rx='4' fill='%2393c5fd'/><rect x='117' y='85' width='18' height='10' rx='4' fill='%2393c5fd'/></svg>" alt="Homem de Ferro">
        <p>Homem de Ferro</p>
      </div>

      <div class="personagem" onclick="mostrarDetalhes('Mario', 'Nintendo', 'Herói dos games')">
        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 220'><rect width='220' height='220' rx='18' fill='%230b3b8c'/><circle cx='110' cy='118' r='48' fill='%23f2c29b'/><path d='M60 92 Q110 42 160 92 L160 110 L60 110Z' fill='%23dc2626'/><rect x='85' y='74' width='50' height='26' rx='8' fill='%23dc2626'/><text x='110' y='92' font-size='18' text-anchor='middle' fill='white' font-family='Arial'>M</text><path d='M82 136 Q110 158 138 136' stroke='%23292424' stroke-width='10' fill='none' stroke-linecap='round'/><circle cx='92' cy='120' r='5'/><circle cx='128' cy='120' r='5'/></svg>" alt="Mario">
        <p>Mario</p>
      </div>

      <div class="personagem" onclick="mostrarDetalhes('Loki', 'Marvel', 'Vilão e anti-herói')">
        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 220'><rect width='220' height='220' rx='18' fill='%23145432'/><path d='M72 45 L95 20 L102 54 L118 54 L125 20 L148 45 L148 150 L72 150Z' fill='%23facc15'/><rect x='82' y='70' width='56' height='72' rx='12' fill='%23111827'/><rect x='90' y='92' width='16' height='8' rx='3' fill='%2393c5fd'/><rect x='114' y='92' width='16' height='8' rx='3' fill='%2393c5fd'/><path d='M92 122 Q110 132 128 122' stroke='%23facc15' stroke-width='5' fill='none'/></svg>" alt="Loki">
        <p>Loki</p>
      </div>
    </div>

    <div id="detalhes">
      <h2 id="nome"></h2>
      <p id="universo"></p>
      <p id="descricao"></p>
    </div>
  </div>

  <script>
    function mostrarDetalhes(nome, universo, descricao) {
      document.getElementById("detalhes").style.display = "block";
      document.getElementById("nome").innerText = nome;
      document.getElementById("universo").innerText = "Universo: " + universo;
      document.getElementById("descricao").innerText = descricao;
    }
  </script>
</body>
</html>
